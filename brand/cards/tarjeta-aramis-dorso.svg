    <text x="9" y="1.2" font-family="'DM Mono',monospace" font-size="3.2" fill="#8A9BB0">
      <tspan fill="#10B981">&gt; </tspan>@aramis.rebai
    </text>
    <!-- LinkedIn (handle largo, fuente reducida a 2.8mm) -->
    <g transform="translate(0, 7)">
