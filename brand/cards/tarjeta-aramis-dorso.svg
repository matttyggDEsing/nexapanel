    <text x="9" y="8.2" font-family="'DM Mono',monospace" font-size="2.8" fill="#8A9BB0">
      <tspan fill="#10B981" font-size="2.8">&gt; </tspan>aramis-rebai-schine-3331083a0
    </text>
    <!-- GitHub -->
    <g transform="translate(0, 14)">
      <use href="#icon-gh" transform="scale(0.643)"/>
    </g>
    <text x="9" y="15.2" font-family="'DM Mono',monospace" font-size="3.2" fill="#8A9BB0">
      <tspan fill="#10B981">&gt; </tspan>aramis70
    </text>
