  <line x1="18" y1="34.5" x2="45" y2="34.5" stroke="#5E7085" stroke-width="0.15" opacity="0.4"/>
  <!-- Redes sociales: icono + > prompt en DM Mono -->
  <g transform="translate(18, 37.5)">
