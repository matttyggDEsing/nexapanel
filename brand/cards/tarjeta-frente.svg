<svg xmlns="http://www.w3.org/2000/svg" width="91mm" height="61mm" viewBox="0 0 91 61">
  <defs>
    <linearGradient id="em-frente" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34D399"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>
  </defs>
  <!-- Guías de corte (crop marks) -->
  <g stroke="#000" stroke-width="0.15" fill="none">
    <line x1="0" y1="0" x2="-3" y2="0"/><line x1="0" y1="0" x2="0" y2="-3"/>
    <line x1="88" y1="0" x2="91" y2="0"/><line x1="88" y1="0" x2="88" y2="-3"/>
    <line x1="0" y1="58" x2="-3" y2="58"/><line x1="0" y1="58" x2="0" y2="61"/>
    <line x1="88" y1="58" x2="91" y2="58"/><line x1="88" y1="58" x2="88" y2="61"/>
    <line x1="1.5" y1="0" x2="1.5" y2="1.5"/><line x1="0" y1="1.5" x2="1.5" y2="1.5"/>
    <line x1="86.5" y1="0" x2="86.5" y2="1.5"/><line x1="88" y1="1.5" x2="86.5" y2="1.5"/>
    <line x1="1.5" y1="58" x2="1.5" y2="59.5"/><line x1="0" y1="59.5" x2="1.5" y2="59.5"/>
    <line x1="86.5" y1="58" x2="86.5" y2="59.5"/><line x1="88" y1="59.5" x2="86.5" y2="59.5"/>
  </g>
  <!-- Bleed background -->
  <rect x="0" y="0" width="91" height="61" fill="#060A0E"/>
  <!-- Decoración geométrica sutil -->
  <g opacity="0.04">
    <rect x="-25" y="-25" width="55" height="55" fill="none" stroke="#10B981" stroke-width="0.3" transform="rotate(45,2.5,2.5)"/>
    <rect x="-20" y="-20" width="45" height="45" fill="none" stroke="#34D399" stroke-width="0.2" transform="rotate(45,2.5,2.5)"/>
    <rect x="55" y="25" width="55" height="55" fill="none" stroke="#10B981" stroke-width="0.3" transform="rotate(45,82.5,52.5)"/>
    <rect x="60" y="30" width="45" height="45" fill="none" stroke="#059669" stroke-width="0.2" transform="rotate(45,82.5,52.5)"/>
  </g>
  <!-- NEXA Core logo centrado: conjunto iso + texto centrado en x=45.5 -->
  <!-- Iso bbox absoluto: x 21.5-42.5, Texto bbox absoluto: x 46.5-69.7 -->
  <!-- Centro conjunto: (21.5+69.7)/2 = 45.6 ≈ 45.5 ✓ -->
  <g transform="translate(48.5, 30.5)">
    <g transform="translate(-15, 0)">
      <polygon points="-7,-10.5 -2,-12 -2,7 -7,8.5" fill="url(#em-frente)"/>
      <polygon points="-7,-10.5 -2,-12 -7,-5.5 -12,-4" fill="#34D399" opacity="0.7"/>
      <polygon points="-7,8.5 -2,7 -7,14 -12,12.5" fill="#059669" opacity="0.5"/>
      <polygon points="-2,-12 3.5,-5.5 3.5,7 -2,7" fill="#10B981"/>
      <polygon points="3.5,-5.5 9,-7 9,7 3.5,7" fill="#059669"/>
      <polygon points="3.5,-5.5 9,-7 3.5,0 -2,1.5" fill="#34D399" opacity="0.7"/>
    </g>
    <text x="-2" y="4" font-family="'Syne',sans-serif" font-size="8" font-weight="800" fill="#F0F4F8" letter-spacing="1">NEXA</text>
  </g>
</svg>
