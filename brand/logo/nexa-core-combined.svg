<svg viewBox="0 0 600 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="c1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34D399"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>
    <linearGradient id="c2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
  </defs>
  <!-- Isometric N mark -->
  <g transform="translate(80,100)">
    <polygon points="-40,-60 -10,-70 -10,40 -40,50" fill="url(#c1)"/>
    <polygon points="-40,-60 -10,-70 -40,-30 -70,-20" fill="#34D399" opacity="0.7"/>
    <polygon points="-40,50 -10,40 -40,80 -70,70" fill="#059669" opacity="0.5"/>
    <polygon points="-10,-70 20,-20 20,70 -10,40" fill="#10B981"/>
    <polygon points="20,-20 50,-30 50,60 20,70" fill="url(#c2)"/>
    <polygon points="20,-20 50,-30 20,10 -10,0" fill="#34D399" opacity="0.7"/>
    <polygon points="20,70 50,60 20,100 -10,90" fill="#059669" opacity="0.5"/>
  </g>
  <!-- NEXA logotype (Syne font style) -->
  <g fill="#F0F4F8">
    <text x="155" y="125" font-family="'Syne','Arial Black',sans-serif" font-size="90" font-weight="800" letter-spacing="4">NEXA</text>
  </g>
</svg>
