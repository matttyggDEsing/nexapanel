      <rect x="0" y="80" width="50" height="120" rx="6" fill="#10B981" opacity="0.25"/>
      <text x="25" y="218" font-family="DM Sans, sans-serif" font-size="10" fill="#5E7085" text-anchor="middle">Mon</text>
      <rect x="90" y="20" width="50" height="180" rx="6" fill="#10B981" opacity="0.25"/>
      <text x="115" y="218" font-family="DM Sans, sans-serif" font-size="10" fill="#5E7085" text-anchor="middle">Tue</text>
      <rect x="180" y="50" width="50" height="150" rx="6" fill="#10B981" opacity="0.25"/>
      <text x="205" y="218" font-family="DM Sans, sans-serif" font-size="10" fill="#5E7085" text-anchor="middle">Wed</text>
      <rect x="270" y="0" width="50" height="200" rx="6" fill="#10B981" opacity="0.8"/>
      <text x="295" y="218" font-family="DM Sans, sans-serif" font-size="10" fill="#5E7085" text-anchor="middle">Thu</text>
      <rect x="360" y="30" width="50" height="170" rx="6" fill="#10B981" opacity="0.25"/>
      <text x="385" y="218" font-family="DM Sans, sans-serif" font-size="10" fill="#5E7085" text-anchor="middle">Fri</text>
      <rect x="450" y="110" width="50" height="90" rx="6" fill="#10B981" opacity="0.25"/>
      <text x="475" y="218" font-family="DM Sans, sans-serif" font-size="10" fill="#5E7085" text-anchor="middle">Sat</text>
      <rect x="540" y="60" width="50" height="140" rx="6" fill="#10B981" opacity="0.25"/>
      <text x="565" y="218" font-family="DM Sans, sans-serif" font-size="10" fill="#5E7085" text-anchor="middle">Sun</text>
    </g>

