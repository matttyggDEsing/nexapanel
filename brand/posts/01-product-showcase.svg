    <rect x="280" y="690" width="340" height="110" rx="12" fill="#161F2A" stroke="#10B981" stroke-opacity="0.1" stroke-width="1"/>
    <text x="300" y="720" font-family="DM Sans, sans-serif" font-size="12" fill="#8A9BB0">Servicios populares</text>
    <rect x="300" y="738" width="80" height="22" rx="6" fill="#10B981" opacity="0.15"/>
    <text x="340" y="754" font-family="DM Sans, sans-serif" font-size="10" fill="#34D399" text-anchor="middle">Instagram</text>
    <rect x="390" y="738" width="65" height="22" rx="6" fill="#10B981" opacity="0.15"/>
    <text x="422" y="754" font-family="DM Sans, sans-serif" font-size="10" fill="#34D399" text-anchor="middle">TikTok</text>
    <rect x="465" y="738" width="65" height="22" rx="6" fill="#10B981" opacity="0.15"/>
    <text x="497" y="754" font-family="DM Sans, sans-serif" font-size="10" fill="#34D399" text-anchor="middle">YouTube</text>
    <rect x="300" y="768" width="60" height="22" rx="6" fill="#10B981" opacity="0.15"/>
    <text x="330" y="784" font-family="DM Sans, sans-serif" font-size="10" fill="#34D399" text-anchor="middle">Twitter</text>

    <rect x="640" y="690" width="340" height="110" rx="12" fill="#161F2A" stroke="#10B981" stroke-opacity="0.1" stroke-width="1"/>
    <text x="660" y="720" font-family="DM Sans, sans-serif" font-size="12" fill="#8A9BB0">Último pedido</text>
    <text x="660" y="748" font-family="DM Mono, monospace" font-size="11" fill="#34D399">10K Instagram Followers</text>
    <text x="660" y="770" font-family="DM Sans, sans-serif" font-size="11" fill="#5E7085">@usuario_fit • Hace 2 min</text>
    <rect x="880" y="755" width="80" height="28" rx="8" fill="#10B981" opacity="0.2"/>
    <text x="920" y="774" font-family="DM Sans, sans-serif" font-size="11" fill="#34D399" text-anchor="middle">Activo</text>
