    <rect x="85" y="323" width="8" height="8" rx="2" fill="#10B981"/>
    <rect x="100" y="324" width="100" height="6" rx="3" fill="#10B981"/>

    <!-- Main content area -->
    <!-- Stats cards row -->
    <rect x="280" y="270" width="220" height="100" rx="12" fill="#161F2A" stroke="#10B981" stroke-opacity="0.1" stroke-width="1"/>
    <text x="300" y="300" font-family="DM Sans, sans-serif" font-size="11" fill="#5E7085">Pedidos activos</text>
    <text x="300" y="335" font-family="Syne, sans-serif" font-weight="800" font-size="36" fill="#34D399">1,247</text>
    <text x="300" y="355" font-family="DM Sans, sans-serif" font-size="11" fill="#10B981">+12.5% esta semana</text>

    <rect x="520" y="270" width="220" height="100" rx="12" fill="#161F2A" stroke="#10B981" stroke-opacity="0.1" stroke-width="1"/>
    <text x="540" y="300" font-family="DM Sans, sans-serif" font-size="11" fill="#5E7085">Ingresos</text>
    <text x="540" y="335" font-family="Syne, sans-serif" font-weight="800" font-size="36" fill="#F0F4F8">$4,820</text>
    <text x="540" y="355" font-family="DM Sans, sans-serif" font-size="11" fill="#10B981">+8.3% este mes</text>

    <rect x="760" y="270" width="220" height="100" rx="12" fill="#161F2A" stroke="#10B981" stroke-opacity="0.1" stroke-width="1"/>
    <text x="780" y="300" font-family="DM Sans, sans-serif" font-size="11" fill="#5E7085">Clientes</text>
    <text x="780" y="335" font-family="Syne, sans-serif" font-weight="800" font-size="36" fill="#F0F4F8">892</text>
    <text x="780" y="355" font-family="DM Sans, sans-serif" font-size="11" fill="#10B981">+5.2% este mes</text>

