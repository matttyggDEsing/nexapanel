    <rect x="80" y="270" width="160" height="8" rx="4" fill="#10B981" opacity="0.3"/>
    <rect x="80" y="295" width="120" height="6" rx="3" fill="#5E7085" opacity="0.3"/>
    <rect x="80" y="320" width="140" height="6" rx="3" fill="#5E7085" opacity="0.2"/>
