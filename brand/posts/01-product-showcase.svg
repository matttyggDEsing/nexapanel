  <!-- Dashboard mockup card -->
  <g clip-path="url(#cardClip)">
    <rect x="60" y="200" width="960" height="620" rx="16" fill="#0B1117" stroke="#10B981" stroke-opacity="0.12" stroke-width="1"/>

    <!-- Top bar -->
    <rect x="60" y="200" width="960" height="50" fill="#111820"/>
    <circle cx="90" cy="225" r="6" fill="#FF5F56"/>
    <circle cx="110" cy="225" r="6" fill="#FFBD2E"/>
    <circle cx="130" cy="225" r="6" fill="#27C93F"/>
