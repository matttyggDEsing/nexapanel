<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs>
    <linearGradient id="emGrad3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6EE7B7" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#10B981" stop-opacity="0.02"/>
    </linearGradient>
    <filter id="glow3">
      <feGaussianBlur stdDeviation="25" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1080" fill="#060A0E"/>

  <!-- Radial glow -->
  <circle cx="540" cy="400" r="400" fill="#10B981" opacity="0.03" filter="url(#glow3)"/>

  <!-- Badge -->
  <rect x="60" y="60" width="120" height="36" rx="18" fill="#10B981" opacity="0.15"/>
  <text x="120" y="84" font-family="Syne, sans-serif" font-weight="700" font-size="13" fill="#34D399" text-anchor="middle" letter-spacing="0.1em">EDUCACIÓN</text>

  <!-- Isotipo -->
  <g transform="translate(920, 55) scale(0.35)">
    <polygon points="20,0 40,10 40,30 20,20" fill="#10B981" opacity="0.8"/>
    <polygon points="40,10 60,0 60,20 40,30" fill="#34D399" opacity="0.6"/>
    <polygon points="0,20 20,30 20,50 0,40" fill="#059669" opacity="0.7"/>
    <polygon points="20,30 40,20 40,40 20,50" fill="#10B981" opacity="0.5"/>
    <polygon points="40,20 60,10 60,30 40,40" fill="#6EE7B7" opacity="0.6"/>
    <polygon points="60,20 80,10 80,30 60,40" fill="#34D399" opacity="0.4"/>
  </g>

  <!-- Title -->
  <text x="60" y="150" font-family="Syne, sans-serif" font-weight="800" font-size="46" fill="#F0F4F8">5 estrategias para</text>
  <text x="60" y="210" font-family="Syne, sans-serif" font-weight="800" font-size="46" fill="#34D399">escalar tu marca</text>
  <text x="60" y="250" font-family="DM Sans, sans-serif" font-size="18" fill="#8A9BB0">Swipe para ver cada una →</text>

  <!-- Tip cards -->
  
    <g>
      <rect x="60" y="300" width="960" height="100" rx="14" fill="#0B1117" stroke="#10B981" stroke-opacity="0.1" stroke-width="1"/>
      <rect x="60" y="300" width="4" height="100" rx="2" fill="#10B981" opacity="0.6"/>
      <text x="100" y="340" font-family="Syne, sans-serif" font-weight="800" font-size="28" fill="#10B981" opacity="0.3">01</text>
      <text x="155" y="338" font-family="Syne, sans-serif" font-weight="700" font-size="20" fill="#F0F4F8">Consistencia Visual</text>
      <text x="155" y="365" font-family="DM Sans, sans-serif" font-size="14" fill="#8A9BB0">Usá una paleta de colores fija. En NEXA todo pasa por emerald.</text>
    </g>
  
    <g>
      <rect x="60" y="420" width="960" height="100" rx="14" fill="#0B1117" stroke="#10B981" stroke-opacity="0.1" stroke-width="1"/>
      <rect x="60" y="420" width="4" height="100" rx="2" fill="#10B981" opacity="0.6"/>
      <text x="100" y="460" font-family="Syne, sans-serif" font-weight="800" font-size="28" fill="#10B981" opacity="0.3">02</text>
      <text x="155" y="458" font-family="Syne, sans-serif" font-weight="700" font-size="20" fill="#F0F4F8">Contenido con Valor</text>
      <text x="155" y="485" font-family="DM Sans, sans-serif" font-size="14" fill="#8A9BB0">Enseñá algo en cada post. El educate-to-sell funciona.</text>
    </g>
  
    <g>
      <rect x="60" y="540" width="960" height="100" rx="14" fill="#0B1117" stroke="#10B981" stroke-opacity="0.1" stroke-width="1"/>
      <rect x="60" y="540" width="4" height="100" rx="2" fill="#10B981" opacity="0.6"/>
      <text x="100" y="580" font-family="Syne, sans-serif" font-weight="800" font-size="28" fill="#10B981" opacity="0.3">03</text>
      <text x="155" y="578" font-family="Syne, sans-serif" font-weight="700" font-size="20" fill="#F0F4F8">Automatizá lo Repetitivo</text>
      <text x="155" y="605" font-family="DM Sans, sans-serif" font-size="14" fill="#8A9BB0">Panels como NexaPanel liberan tu tiempo para crear.</text>
    </g>
  
    <g>
      <rect x="60" y="660" width="960" height="100" rx="14" fill="#0B1117" stroke="#10B981" stroke-opacity="0.1" stroke-width="1"/>
      <rect x="60" y="660" width="4" height="100" rx="2" fill="#10B981" opacity="0.6"/>
      <text x="100" y="700" font-family="Syne, sans-serif" font-weight="800" font-size="28" fill="#10B981" opacity="0.3">04</text>
      <text x="155" y="698" font-family="Syne, sans-serif" font-weight="700" font-size="20" fill="#F0F4F8">Métricas > Instinto</text>
      <text x="155" y="725" font-family="DM Sans, sans-serif" font-size="14" fill="#8A9BB0">Mirá los números. Lo que no se mide, no se mejora.</text>
    </g>
  
    <g>
      <rect x="60" y="780" width="960" height="100" rx="14" fill="#0B1117" stroke="#10B981" stroke-opacity="0.1" stroke-width="1"/>
      <rect x="60" y="780" width="4" height="100" rx="2" fill="#10B981" opacity="0.6"/>
      <text x="100" y="820" font-family="Syne, sans-serif" font-weight="800" font-size="28" fill="#10B981" opacity="0.3">05</text>
      <text x="155" y="818" font-family="Syne, sans-serif" font-weight="700" font-size="20" fill="#F0F4F8">Comunidad, no Audiencia</text>
      <text x="155" y="845" font-family="DM Sans, sans-serif" font-size="14" fill="#8A9BB0">Respondé, interactuá, creá conversación real.</text>
    </g>
  

  <!-- Bottom bar -->
  <rect x="0" y="1000" width="1080" height="80" fill="#0B1117" opacity="0.8"/>
  <line x1="0" y1="1000" x2="1080" y2="1000" stroke="#10B981" stroke-opacity="0.12" stroke-width="1"/>
  <text x="60" y="1035" font-family="Syne, sans-serif" font-weight="700" font-size="16" fill="#F0F4F8">NEXA</text>
  <text x="130" y="1035" font-family="DM Sans, sans-serif" font-size="14" fill="#5E7085">Tecnología que trasciende</text>
  <text x="1020" y="1035" font-family="DM Sans, sans-serif" font-size="13" fill="#5E7085" text-anchor="end">nexapanel.com</text>
</svg>