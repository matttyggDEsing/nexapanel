<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs>
    <linearGradient id="emGrad4" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10B981" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#6EE7B7" stop-opacity="0.02"/>
    </linearGradient>
    <filter id="glow4">
      <feGaussianBlur stdDeviation="40" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1080" fill="#060A0E"/>

  <!-- Large glow -->
  <circle cx="540" cy="500" r="350" fill="#10B981" opacity="0.04" filter="url(#glow4)"/>

  <!-- Topographic lines -->
  <g opacity="0.05" stroke="#34D399" stroke-width="1" fill="none">
    <path d="M0,200 Q200,150 400,220 T800,180 T1080,240"/>
    <path d="M0,250 Q200,200 400,270 T800,230 T1080,290"/>
    <path d="M0,300 Q200,250 400,320 T800,280 T1080,340"/>
    <path d="M0,700 Q300,660 600,720 T1080,690"/>
    <path d="M0,750 Q300,710 600,770 T1080,740"/>
  </g>

  <!-- Badge -->
  <rect x="60" y="60" width="160" height="36" rx="18" fill="#10B981" opacity="0.15"/>
  <text x="140" y="84" font-family="Syne, sans-serif" font-weight="700" font-size="13" fill="#34D399" text-anchor="middle" letter-spacing="0.1em">BEHIND THE SCENES</text>

  <!-- Isotipo -->
  <g transform="translate(920, 55) scale(0.35)">
    <polygon points="20,0 40,10 40,30 20,20" fill="#10B981" opacity="0.8"/>
    <polygon points="40,10 60,0 60,20 40,30" fill="#34D399" opacity="0.6"/>
    <polygon points="0,20 20,30 20,50 0,40" fill="#059669" opacity="0.7"/>
    <polygon points="20,30 40,20 40,40 20,50" fill="#10B981" opacity="0.5"/>
    <polygon points="40,20 60,10 60,30 40,40" fill="#6EE7B7" opacity="0.6"/>
    <polygon points="60,20 80,10 80,30 60,40" fill="#34D399" opacity="0.4"/>
  </g>

  <!-- Big quote -->
  <text x="540" y="200" font-family="Syne, sans-serif" font-weight="800" font-size="80" fill="#10B981" opacity="0.08" text-anchor="middle">"</text>

  <!-- Main text -->
  <text x="60" y="260" font-family="Syne, sans-serif" font-weight="800" font-size="44" fill="#F0F4F8">No construimos</text>
  <text x="60" y="320" font-family="Syne, sans-serif" font-weight="800" font-size="44" fill="#F0F4F8">un SMM panel.</text>
  <text x="60" y="400" font-family="Syne, sans-serif" font-weight="800" font-size="44" fill="#34D399">Construimos</text>
  <text x="60" y="460" font-family="Syne, sans-serif" font-weight="800" font-size="44" fill="#34D399">infraestructura.</text>

  <!-- Divider -->
  <rect x="60" y="510" width="120" height="3" rx="1.5" fill="#10B981" opacity="0.5"/>

  <!-- Description -->
  <text x="60" y="560" font-family="DM Sans, sans-serif" font-size="17" fill="#8A9BB0" letter-spacing="0.01em">NEXA nació de la necesidad de crear tecnología que</text>
  <text x="60" y="588" font-family="DM Sans, sans-serif" font-size="17" fill="#8A9BB0" letter-spacing="0.01em">realmente funcione. Cada línea de código, cada sistema,</text>
  <text x="60" y="616" font-family="DM Sans, sans-serif" font-size="17" fill="#8A9BB0" letter-spacing="0.01em">cada decisión de arquitectura está pensada para escalar.</text>

  <!-- Stats -->
  <g transform="translate(60, 660)">
    <rect x="0" y="0" width="200" height="80" rx="12" fill="#0B1117" stroke="#10B981" stroke-opacity="0.1" stroke-width="1"/>
    <text x="100" y="35" font-family="Syne, sans-serif" font-weight="800" font-size="28" fill="#34D399" text-anchor="middle">6+</text>
    <text x="100" y="58" font-family="DM Sans, sans-serif" font-size="12" fill="#5E7085" text-anchor="middle">meses desarrollando</text>

    <rect x="220" y="0" width="200" height="80" rx="12" fill="#0B1117" stroke="#10B981" stroke-opacity="0.1" stroke-width="1"/>
    <text x="320" y="35" font-family="Syne, sans-serif" font-weight="800" font-size="28" fill="#34D399" text-anchor="middle">30+</text>
    <text x="320" y="58" font-family="DM Sans, sans-serif" font-size="12" fill="#5E7085" text-anchor="middle">plataformas soportadas</text>

    <rect x="440" y="0" width="200" height="80" rx="12" fill="#0B1117" stroke="#10B981" stroke-opacity="0.1" stroke-width="1"/>
    <text x="540" y="35" font-family="Syne, sans-serif" font-weight="800" font-size="28" fill="#34D399" text-anchor="middle">99.9%</text>
    <text x="540" y="58" font-family="DM Sans, sans-serif" font-size="12" fill="#5E7085" text-anchor="middle">uptime garantizado</text>

    <rect x="660" y="0" width="200" height="80" rx="12" fill="#0B1117" stroke="#10B981" stroke-opacity="0.1" stroke-width="1"/>
    <text x="760" y="35" font-family="Syne, sans-serif" font-weight="800" font-size="28" fill="#34D399" text-anchor="middle">24/7</text>
    <text x="760" y="58" font-family="DM Sans, sans-serif" font-size="12" fill="#5E7085" text-anchor="middle">soporte activo</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="1000" width="1080" height="80" fill="#0B1117" opacity="0.8"/>
  <line x1="0" y1="1000" x2="1080" y2="1000" stroke="#10B981" stroke-opacity="0.12" stroke-width="1"/>
  <text x="60" y="1035" font-family="Syne, sans-serif" font-weight="700" font-size="16" fill="#F0F4F8">NEXA</text>
  <text x="130" y="1035" font-family="DM Sans, sans-serif" font-size="14" fill="#5E7085">Tecnología que trasciende</text>
  <text x="1020" y="1035" font-family="DM Sans, sans-serif" font-size="13" fill="#5E7085" text-anchor="end">nexapanel.com</text>
</svg>