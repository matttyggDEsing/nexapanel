<tspan fill="#34D399">export class</tspan><tspan fill="#F0F4F8"> CoreEngine {</tspan></text><text x="80" y="522" font-family="DM Mono, monospace" font-size="12" fill="#5E7085" opacity="0.3"> 9</text><text x="120" y="522" font-family="DM Mono, monospace" font-size="13"><tspan fill="#34D399">private</tspan><tspan fill="#F0F4F8"> arch;</tspan></text><text x="80" y="543" font-family="DM Mono, monospace" font-size="12" fill="#5E7085" opacity="0.3">10</text><text x="120" y="543" font-family="DM Mono, monospace" font-size="13"><tspan fill="#34D399">async</tspan><tspan fill="#F0F4F8"> init() {</tspan></text><text x="80" y="564" font-family="DM Mono, monospace" font-size="12" fill="#5E7085" opacity="0.3">11</text><text x="136" y="564" font-family="DM Mono, monospace" font-size="13"><tspan fill="#34D399">await</tspan><tspan fill="#F0F4F8"> </tspan><tspan fill="#34D399">this</tspan><tspan fill="#F0F4F8">.loadModules();</tspan></text><text x="80" y="585" font-family="DM Mono, monospace" font-size="12" fill="#5E7085" opacity="0.3">12</text><text x="136" y="585" font-family="DM Mono, monospace" font-size="13"><tspan fill="#34D399">await</tspan><tspan fill="#F0F4F8"> </tspan><tspan fill="#34D399">this</tspan><tspan fill="#F0F4F8">.connectEvents();</tspan></text><text x="80" y="606" font-family="DM Mono, monospace" font-size="12" fill="#5E7085" opacity="0.3">13</text><text x="136" y="606" font-family="DM Mono, monospace" font-size="13"><tspan fill="#34D399">await</tspan><tspan fill="#F0F4F8"> </tspan><tspan fill="#34D399">this</tspan><tspan fill="#F0F4F8">.warmCache();</tspan></text><text x="80" y="627" font-family="DM Mono, monospace" font-size="12" fill="#5E7085" opacity="0.3">14</text><text x="120" y="627" font-family="DM Mono, monospace" font-size="13"><tspan fill="#F0F4F8">}</tspan></text><text x="80" y="648" font-family="DM Mono, monospace" font-size="12" fill="#5E7085" opacity="0.3">15</text><text x="120" y="648" font-family="DM Mono, monospace" font-size="13"><tspan fill="#34D399">private async</tspan><tspan fill="#F0F4F8"> loadModules() {</tspan></text><text x="80" y="669" font-family="DM Mono, monospace" font-size="12" fill="#5E7085" opacity="0.3">16</text><text x="136" y="669" font-family="DM Mono, monospace" font-size="13"><tspan fill="#34D399">for</tspan><tspan fill="#F0F4F8"> (</tspan><tspan fill="#34D399">const</tspan><tspan fill="#F0F4F8"> m </tspan><tspan fill="#34D399">of</tspan><tspan fill="#F0F4F8"> </tspan><tspan fill="#34D399">this</tspan><tspan fill="#F0F4F8">.arch.modules) {</tspan></text><text x="80" y="690" font-family="DM Mono, monospace" font-size="12" fill="#5E7085" opacity="0.3">17</text><text x="152" y="690" font-family="DM Mono, monospace" font-size="13"><tspan fill="#34D399">await</tspan><tspan fill="#F0F4F8"> m.bootstrap();</tspan></text><text x="80" y="711" font-family="DM Mono, monospace" font-size="12" fill="#5E7085" opacity="0.3">18</text><text x="136" y="711" font-family="DM Mono, monospace" font-size="13"><tspan fill="#F0F4F8">}</tspan></text><text x="80" y="732" font-family="DM Mono, monospace" font-size="12" fill="#5E7085" opacity="0.3">19</text><text x="120" y="732" font-family="DM Mono, monospace" font-size="13"><tspan fill="#F0F4F8">}</tspan></text><text x="80" y="753" font-family="DM Mono, monospace" font-size="12" fill="#5E7085" opacity="0.3">20</text><text x="104" y="753" font-family="DM Mono, monospace" font-size="13"><tspan fill="#F0F4F8">}</tspan></text>
