    <text x="80" y="304" font-family="DM Mono, monospace" font-size="11" fill="#5E7085" opacity="0.3"> 1</text><text x="104" y="304" font-family="DM Mono, monospace" font-size="12"><tspan fill="#34D399">export interface</tspan><tspan fill="#F0F4F8"> SystemArch {</tspan></text><text x="80" y="324" font-family="DM Mono, monospace" font-size="11" fill="#5E7085" opacity="0.3"> 2</text><text x="120" y="324" font-family="DM Mono, monospace" font-size="12"><tspan fill="#F0F4F8">modules:</tspan><tspan fill="#6EE7B7"> Module[]</tspan><tspan fill="#F0F4F8">;</tspan></text><text x="80" y="344" font-family="DM Mono, monospace" font-size="11" fill="#5E7085" opacity="0.3"> 3</text><text x="120" y="344" font-family="DM Mono, monospace" font-size="12"><tspan fill="#F0F4F8">events:</tspan><tspan fill="#6EE7B7"> EventBus</tspan><tspan fill="#F0F4F8">;</tspan></text><text x="80" y="364" font-family="DM Mono, monospace" font-size="11" fill="#5E7085" opacity="0.3"> 4</text><text x="120" y="364" font-family="DM Mono, monospace" font-size="12"><tspan fill="#F0F4F8">cache:</tspan><tspan fill="#6EE7B7"> RedisLayer</tspan><tspan fill="#F0F4F8">;</tspan></text><text x="80" y="384" font-family="DM Mono, monospace" font-size="11" fill="#5E7085" opacity="0.3"> 5</text><text x="104" y="384" font-family="DM Mono, monospace" font-size="12"><tspan fill="#F0F4F8">}</tspan></text><text x="80" y="404" font-family="DM Mono, monospace" font-size="11" fill="#5E7085" opacity="0.3"> 6</text><text x="104" y="404" font-family="DM Mono, monospace" font-size="12" fill="#5E7085">// Módulos independientes</text><text x="80" y="424" font-family="DM Mono, monospace" font-size="11" fill="#5E7085" opacity="0.3"> 7</text><text x="104" y="424" font-family="DM Mono, monospace" font-size="12" fill="#5E7085">// Comunicación async vía eventos</text><text x="80" y="444" font-family="DM Mono, monospace" font-size="11" fill="#5E7085" opacity="0.3"> 8</text><text x="104" y="444" font-family="DM Mono, monospace" font-size="12"><tspan fill="#34D399">export class</tspan><tspan fill="#F0F4F8"> CoreEngine {</tspan></text><text x="80" y="464" font-family="DM Mono, monospace" font-size="11" fill="#5E7085" opacity="0.3"> 9</text><text x="120" y="464" font-family="DM Mono, monospace" font-size="12"><tspan fill="#34D399">private</tspan><tspan fill="#F0F4F8"> arch;</tspan></text><text x="80" y="484" font-family="DM Mono, monospace" font-size="11" fill="#5E7085" opacity="0.3">10</text><text x="120" y="484" font-family="DM Mono, monospace" font-size="12"><tspan fill="#34D399">async</tspan><tspan fill="#F0F4F8"> init() {</tspan></text><text x="80" y="504" font-family="DM Mono, monospace" font-size="11" fill="#5E7085" opacity="0.3">11</text><text x="136" y="504" font-family="DM Mono, monospace" font-size="12"><tspan fill="#34D399">await</tspan><tspan fill="#F0F4F8"> </tspan><tspan fill="#34D399">this</tspan><tspan fill="#F0F4F8">.loadModules();</tspan></text><text x="80" y="524" font-family="DM Mono, monospace" font-size="11" fill="#5E7085" opacity="0.3">12</text><text x="136" y="524" font-family="DM Mono, monospace" font-size="12"><tspan fill="#34D399">await</tspan><tspan fill="#F0F4F8"> </tspan><tspan fill="#34D399">this</tspan><tspan fill="#F0F4F8">.connectEvents();</tspan></text><text x="80" y="544" font-family="DM Mono, monospace" font-size="11" fill="#5E7085" opacity="0.3">13</text><text x="136" y="544" font-family="DM Mono, monospace" font-size="12"><tspan fill="#34D399">await</tspan><tspan fill="#F0F4F8"> </tspan><tspan fill="#34D399">this</tspan><tspan fill="#F0F4F8">.warmCache();</tspan></text><text x="80" y="564" font-family="DM Mono, monospace" font-size="11" fill="#5E7085" opacity="0.3">14</text><text x="120" y="564" font-family="DM Mono, monospace" font-size="12"><tspan fill="#F0F4F8">}</tspan></text><text x="80" y="584" font-family="DM Mono, monospace" font-size="11" fill="#5E7085" opacity="0.3">15</text><text x="120" y="584" font-family="DM Mono, monospace" font-size="12"><tspan fill="#34D399">private async</tspan><tspan fill="#F0F4F8"> loadModules() {</tspan></text><text x="80" y="604" font-family="DM Mono, monospace" font-size="11" fill="#5E7085" opacity="0.3">16</text><text x="136" y="604" font-family="DM Mono, monospace" font-size="12"><tspan fill="#34D399">for</tspan><tspan fill="#F0F4F8"> (</tspan><tspan fill="#34D399">const</tspan><tspan fill="#F0F4F8"> m </tspan><tspan fill="#34D399">of</tspan><tspan fill="#F0F4F8"> </tspan><tspan fill="#34D399">this</tspan><tspan fill="#F0F4F8">.arch.modules) {</tspan></text><text x="80" y="624" font-family="DM Mono, monospace" font-size="11" fill="#5E7085" opacity="0.3">17</text><text x="152" y="624" font-family="DM Mono, monospace" font-size="12"><tspan fill="#34D399">await</tspan><tspan fill="#F0F4F8"> m.bootstrap();</tspan></text><text x="80" y="644" font-family="DM Mono, monospace" font-size="11" fill="#5E7085" opacity="0.3">18</text><text x="136" y="644" font-family="DM Mono, monospace" font-size="12"><tspan fill="#F0F4F8">}</tspan></text><text x="80" y="664" font-family="DM Mono, monospace" font-size="11" fill="#5E7085" opacity="0.3">19</text><text x="120" y="664" font-family="DM Mono, monospace" font-size="12"><tspan fill="#F0F4F8">}</tspan></text><text x="80" y="684" font-family="DM Mono, monospace" font-size="11" fill="#5E7085" opacity="0.3">20</text><text x="104" y="684" font-family="DM Mono, monospace" font-size="12"><tspan fill="#F0F4F8">}</tspan></text>
