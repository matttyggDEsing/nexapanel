    <path d="M-100,340 C300,390 600,190 960,300 C1320,410 1620,270 2020,340" stroke="#10B981" stroke-width="2"/>
    <path d="M-100,420 C300,470 600,270 960,380 C1320,490 1620,350 2020,420" stroke="#34D399" stroke-width="2"/>
    <path d="M-100,500 C300,550 600,350 960,460 C1320,570 1620,430 2020,500" stroke="#10B981" stroke-width="2"/>
  </g>
  <!-- Contenido: isotipo izquierda, texto derecha -->
  <g transform="translate(350, 240)">
    <g transform="scale(3.5)">
      <polygon points="-20,-30 -5,-35 -5,20 -20,25" fill="url(#grad1)"/>
      <polygon points="-20,-30 -5,-35 -20,-15 -35,-10" fill="#34D399"/>
