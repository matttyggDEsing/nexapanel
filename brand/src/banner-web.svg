    <text x="0" y="50" font-family="'DM Sans', sans-serif" font-size="28" font-weight="400" fill="#10B981" letter-spacing="4">Tecnología que trasciende</text>
    <line x1="0" y1="70" x2="400" y2="70" stroke="#10B981" stroke-width="1" opacity="0.3"/>
