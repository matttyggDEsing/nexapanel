<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <defs>
    <style>
      @font-face { font-family: 'Syne'; src: url('../fonts/Syne-Variable.ttf'); }
      @font-face { font-family: 'DM Sans'; src: url('../fonts/DMSans-Variable.ttf'); }
    </style>
    <linearGradient id="emGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#34D399"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="800" fill="#060A0E"/>

  <!-- Title -->
  <text x="60" y="60" font-family="Syne, sans-serif" font-size="32" font-weight="800" fill="#F0F4F8" letter-spacing="-0.02em">NEXA Color Palette</text>
  <text x="60" y="88" font-family="'DM Sans', sans-serif" font-size="14" fill="#5E7085">Brand Guidelines v1.0 — All colors with HEX and usage</text>

  <!-- Backgrounds Section -->
  <text x="60" y="140" font-family="Syne, sans-serif" font-size="16" font-weight="700" fill="#8A9BB0" letter-spacing="0.03em">BACKGROUNDS</text>

  <!-- bg -->
  <rect x="60" y="160" width="160" height="100" rx="12" fill="#060A0E" stroke="#161F2A" stroke-width="1"/>
  <text x="60" y="285" font-family="'DM Sans', sans-serif" font-size="14" font-weight="700" fill="#F0F4F8">bg</text>
  <text x="60" y="302" font-family="'DM Mono', monospace" font-size="12" fill="#5E7085">#060A0E</text>
  <text x="60" y="318" font-family="'DM Sans', sans-serif" font-size="11" fill="#5E7085">Fondo principal, body</text>

  <!-- bg2 -->
  <rect x="250" y="160" width="160" height="100" rx="12" fill="#0B1117" stroke="#161F2A" stroke-width="1"/>
  <text x="250" y="285" font-family="'DM Sans', sans-serif" font-size="14" font-weight="700" fill="#F0F4F8">bg2</text>
  <text x="250" y="302" font-family="'DM Mono', monospace" font-size="12" fill="#5E7085">#0B1117</text>
  <text x="250" y="318" font-family="'DM Sans', sans-serif" font-size="11" fill="#5E7085">Cards, superficies</text>

  <!-- bg3 -->
  <rect x="440" y="160" width="160" height="100" rx="12" fill="#111820" stroke="#161F2A" stroke-width="1"/>
  <text x="440" y="285" font-family="'DM Sans', sans-serif" font-size="14" font-weight="700" fill="#F0F4F8">bg3</text>
  <text x="440" y="302" font-family="'DM Mono', monospace" font-size="12" fill="#5E7085">#111820</text>
  <text x="440" y="318" font-family="'DM Sans', sans-serif" font-size="11" fill="#5E7085">Inputs, terciario</text>

  <!-- bg4 -->
  <rect x="630" y="160" width="160" height="100" rx="12" fill="#161F2A" stroke="#1F2B3A" stroke-width="1"/>
  <text x="630" y="285" font-family="'DM Sans', sans-serif" font-size="14" font-weight="700" fill="#F0F4F8">bg4</text>
  <text x="630" y="302" font-family="'DM Mono', monospace" font-size="12" fill="#5E7085">#161F2A</text>
  <text x="630" y="318" font-family="'DM Sans', sans-serif" font-size="11" fill="#5E7085">Hover, active states</text>

  <!-- Emeralds Section -->
  <text x="60" y="375" font-family="Syne, sans-serif" font-size="16" font-weight="700" fill="#8A9BB0" letter-spacing="0.03em">EMERALDS</text>

  <!-- emerald -->
  <rect x="60" y="395" width="160" height="100" rx="12" fill="#10B981"/>
  <text x="60" y="520" font-family="'DM Sans', sans-serif" font-size="14" font-weight="700" fill="#F0F4F8">emerald</text>
  <text x="60" y="537" font-family="'DM Mono', monospace" font-size="12" fill="#5E7085">#10B981</text>
  <text x="60" y="553" font-family="'DM Sans', sans-serif" font-size="11" fill="#5E7085">CTAs, links, accent</text>

  <!-- emerald 2 -->
  <rect x="250" y="395" width="160" height="100" rx="12" fill="#059669"/>
  <text x="250" y="520" font-family="'DM Sans', sans-serif" font-size="14" font-weight="700" fill="#F0F4F8">emerald 2</text>
  <text x="250" y="537" font-family="'DM Mono', monospace" font-size="12" fill="#5E7085">#059669</text>
  <text x="250" y="553" font-family="'DM Sans', sans-serif" font-size="11" fill="#5E7085">Borders, secondary</text>

  <!-- emerald 3 -->
  <rect x="440" y="395" width="160" height="100" rx="12" fill="#34D399"/>
  <text x="440" y="520" font-family="'DM Sans', sans-serif" font-size="14" font-weight="700" fill="#F0F4F8">emerald 3</text>
  <text x="440" y="537" font-family="'DM Mono', monospace" font-size="12" fill="#5E7085">#34D399</text>
  <text x="440" y="553" font-family="'DM Sans', sans-serif" font-size="11" fill="#5E7085">Hover, highlights</text>

  <!-- emerald 4 -->
  <rect x="630" y="395" width="160" height="100" rx="12" fill="#6EE7B7"/>
  <text x="630" y="520" font-family="'DM Sans', sans-serif" font-size="14" font-weight="700" fill="#060A0E">emerald 4</text>
  <text x="630" y="537" font-family="'DM Mono', monospace" font-size="12" fill="#5E7085">#6EE7B7</text>
  <text x="630" y="553" font-family="'DM Sans', sans-serif" font-size="11" fill="#5E7085">Tags, small text</text>

  <!-- Text Section -->
  <text x="60" y="610" font-family="Syne, sans-serif" font-size="16" font-weight="700" fill="#8A9BB0" letter-spacing="0.03em">TEXT</text>

  <!-- txt -->
  <rect x="60" y="630" width="160" height="70" rx="12" fill="#111820"/>
  <text x="140" y="674" font-family="'DM Sans', sans-serif" font-size="16" font-weight="700" fill="#F0F4F8" text-anchor="middle">txt — #F0F4F8</text>
  <text x="140" y="695" font-family="'DM Sans', sans-serif" font-size="11" fill="#5E7085" text-anchor="middle">Headlines, primary text</text>

  <!-- txt2 -->
  <rect x="250" y="630" width="160" height="70" rx="12" fill="#111820"/>
  <text x="330" y="674" font-family="'DM Sans', sans-serif" font-size="16" font-weight="500" fill="#8A9BB0" text-anchor="middle">txt2 — #8A9BB0</text>
  <text x="330" y="695" font-family="'DM Sans', sans-serif" font-size="11" fill="#5E7085" text-anchor="middle">Body, labels</text>

  <!-- txt3 -->
  <rect x="440" y="630" width="160" height="70" rx="12" fill="#111820"/>
  <text x="520" y="674" font-family="'DM Sans', sans-serif" font-size="16" fill="#5E7085" text-anchor="middle">txt3 — #5E7085</text>
  <text x="520" y="695" font-family="'DM Sans', sans-serif" font-size="11" fill="#5E7085" text-anchor="middle">Captions, placeholders</text>

  <!-- States Section -->
  <text x="830" y="140" font-family="Syne, sans-serif" font-size="16" font-weight="700" fill="#8A9BB0" letter-spacing="0.03em">STATES</text>

  <rect x="830" y="160" width="140" height="45" rx="8" fill="rgba(252,211,77,0.12)"/>
  <text x="900" y="189" font-family="'DM Sans', sans-serif" font-size="13" font-weight="500" fill="#FCD34D" text-anchor="middle">Pending</text>

  <rect x="830" y="215" width="140" height="45" rx="8" fill="rgba(52,211,153,0.12)"/>
  <text x="900" y="244" font-family="'DM Sans', sans-serif" font-size="13" font-weight="500" fill="#34D399" text-anchor="middle">Active</text>

  <rect x="830" y="270" width="140" height="45" rx="8" fill="rgba(165,180,252,0.12)"/>
  <text x="900" y="299" font-family="'DM Sans', sans-serif" font-size="13" font-weight="500" fill="#A5B4FC" text-anchor="middle">Completed</text>

  <rect x="830" y="325" width="140" height="45" rx="8" fill="rgba(252,165,165,0.12)"/>
  <text x="900" y="354" font-family="'DM Sans', sans-serif" font-size="13" font-weight="500" fill="#FCA5A5" text-anchor="middle">Error</text>

  <rect x="830" y="380" width="140" height="45" rx="8" fill="rgba(147,197,253,0.12)"/>
  <text x="900" y="409" font-family="'DM Sans', sans-serif" font-size="13" font-weight="500" fill="#93C5FD" text-anchor="middle">Processing</text>

  <rect x="830" y="435" width="140" height="45" rx="8" fill="rgba(251,191,36,0.12)"/>
  <text x="900" y="464" font-family="'DM Sans', sans-serif" font-size="13" font-weight="500" fill="#FBBF24" text-anchor="middle">Warning</text>

  <rect x="830" y="490" width="140" height="45" rx="8" fill="rgba(196,181,253,0.12)"/>
  <text x="900" y="519" font-family="'DM Sans', sans-serif" font-size="13" font-weight="500" fill="#C4B5FD" text-anchor="middle">Purple</text>

  <!-- Logo Usage -->
  <text x="830" y="580" font-family="Syne, sans-serif" font-size="16" font-weight="700" fill="#8A9BB0" letter-spacing="0.03em">LOGO MINIMUM SIZES</text>
  <text x="830" y="605" font-family="'DM Sans', sans-serif" font-size="13" fill="#5E7085">Digital: 32px height min</text>
  <text x="830" y="625" font-family="'DM Sans', sans-serif" font-size="13" fill="#5E7085">Print: 10mm height min</text>
  <text x="830" y="645" font-family="'DM Sans', sans-serif" font-size="13" fill="#5E7085">Favicon: 16x16px</text>
  <text x="830" y="665" font-family="'DM Sans', sans-serif" font-size="13" fill="#5E7085">Social profile: 100x100px</text>
</svg>
