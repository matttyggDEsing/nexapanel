# ============================================================
# nginx/nginx.conf — Reverse Proxy de producción
# Proxy al backend en /api  |  Sirve el frontend
# SSL con certbot (Let's Encrypt)
# ============================================================

# Cambiar TU_DOMINIO.COM por tu dominio real antes de usar

# Rate limiting (100 req/s por IP)
limit_req_zone $binary_remote_addr zone=api:10m rate=100r/s;
limit_req_zone $binary_remote_addr zone=login:10m rate=5r/s;

upstream nexapanel_backend {
    server backend:5000;
    keepalive 32;
}

# ── Redirect HTTP → HTTPS ─────────────────────────────────────
server {
    listen 80;
    server_name TU_DOMINIO.COM www.TU_DOMINIO.COM;

    # Ruta para certbot ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ─────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name TU_DOMINIO.COM www.TU_DOMINIO.COM;

    # Certificados gestionados por certbot
    ssl_certificate     /etc/letsencrypt/live/TU_DOMINIO.COM/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/TU_DOMINIO.COM/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # Headers de seguridad
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy "strict-origin-when-cross-origin";
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data:; connect-src 'self' https://peakerr.com;" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Tamaño máximo del body (órdenes, uploads)
    client_max_body_size 10m;

    # ── API → backend ───────────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=200 nodelay;
        proxy_pass         http://nexapanel_backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # ── Health check ─────────────────────────────────────────────
    location /health {
        proxy_pass http://nexapanel_backend;
        proxy_set_header Host $host;
        access_log off;
    }

    # ── Frontend (build estático de Vite) ────────────────────────
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    location ~* \.(js|css|woff2?|svg|ico|png|jpg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location = /index.html {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
